services:
  mlflow:
    image: python:3.11-slim
    environment:
      - MLFLOW_ALLOW_FILE_STORE=true
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlruns
    command: >
      bash -c "
      pip install mlflow &&
      mlflow server
      --backend-store-uri /mlruns
      --host 0.0.0.0
      --port 5000
      "

  trainer:
    build: .
    depends_on:
      - mlflow